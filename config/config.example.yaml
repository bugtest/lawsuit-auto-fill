# 民事起诉状自动填写工具 - 配置示例

# OCR 配置
ocr:
  # 模式：local / tencent / aliyun / hybrid
  mode: hybrid
  
  # 本地 OCR 配置
  local:
    lang: chi_sim+eng
    dpi: 200
    max_pages: 20
  
  # 腾讯云 OCR 配置
  tencent:
    secret_id: ${TENCENT_SECRET_ID}
    secret_key: ${TENCENT_SECRET_KEY}
    region: ap-guangzhou
  
  # 阿里云 OCR 配置
  aliyun:
    access_key_id: ${ALIYUN_ACCESS_KEY_ID}
    access_key_secret: ${ALIYUN_ACCESS_KEY_SECRET}
    endpoint: ocr.cn-shanghai.aliyuncs.com

# 大模型配置（用于智能信息提取）
llm:
  # 提供商：aliyun(阿里云百炼)
  provider: aliyun
  api_key: ${DASHSCOPE_API_KEY}
  model: qwen-plus  # qwen-plus / qwen-max

# 提取模式：regex(正则) / llm(大模型) / hybrid(混合交叉验证)
extract:
  mode: hybrid

# 输出配置
output:
  # 默认输出目录
  default_dir: ./output
  
  # 文件命名模板
  filename_template: "{被告姓名}_民事起诉状_{timestamp}.docx"
  
  # 是否生成完整版
  generate_complete: true

# 日志配置
logging:
  level: INFO
  file: logs/lawsuit_filler.log
